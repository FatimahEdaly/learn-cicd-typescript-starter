name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # خطوة تسجيل الدخول باستخدام السر (Secret) الذي أضفتيه في GitHub
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
          # تأكدي من إضافة السطر التالي لربط الـ Token بالمشروع الصحيح
          project_id: '584358961194' 

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build and Push to Artifact Registry'
        run: |
          gcloud builds submit --project notely-489920 --tag us-central1-docker.pkg.dev/notely-489920/notely-ar-repo/notely:${{ github.sha }} .
      - name: Run migrations
        run: npm run migrate # أو الأمر المحدد في مشروعك
      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/notely-489920/notely-ar-repo/notely:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --project notely-489920 \
            --max-instances=4